worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream netstamp_api {
    server controller:8080;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/web;
    index index.html;

    location = /api {
      proxy_pass http://netstamp_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /api/ {
      proxy_pass http://netstamp_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ~ ^/(lifez|readyz)$ {
      proxy_pass http://netstamp_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location = / {
      root /usr/share/nginx/docs;
      try_files /index.html =404;
    }

    location = /openapi.json {
      root /usr/share/nginx/docs;
      try_files /openapi.json =404;
      add_header Cache-Control "no-cache";
    }

    location ^~ /_astro/ {
      root /usr/share/nginx/docs;
      try_files $uri =404;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /storybook {
      return 308 /storybook/;
    }

    location ^~ /storybook/ {
      root /usr/share/nginx/docs;
      try_files $uri $uri/ /storybook/index.html;
    }

    location ~ ^/(docs|openapi|components)(/.*)?$ {
      root /usr/share/nginx/docs;
      try_files $uri $uri/ /index.html;
    }

    location /assets/ {
      root /usr/share/nginx/web;
      try_files $uri =404;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      root /usr/share/nginx/web;
      try_files $uri $uri/ /index.html;
    }
  }

}
