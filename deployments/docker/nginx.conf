worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream netstamp_api {
    server controller:8080;
    keepalive 32;
  }

  upstream netstamp_grafana {
    server grafana:3000;
    keepalive 16;
  }

  server {
    listen 80;
    server_name dashboard.netstamp.dev;

    root /usr/share/nginx/web;
    index index.html;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location = /api {
      proxy_pass http://netstamp_api;
    }

    location /api/ {
      proxy_pass http://netstamp_api;
    }

    location = /healthz {
      proxy_pass http://netstamp_api/api/v1/healthz;
    }

    location = /grafana {
      return 308 /grafana/;
    }

    location ^~ /grafana/ {
      proxy_set_header X-Forwarded-Prefix /grafana;
      proxy_read_timeout 1h;
      proxy_pass http://netstamp_grafana;
    }

    location /assets/ {
      root /usr/share/nginx/web;
      try_files $uri =404;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      root /usr/share/nginx/web;
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 80 default_server;
    server_name _;

    location / {
      return 404;
    }
  }

}
