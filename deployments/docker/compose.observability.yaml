x-backend-build: &backend-build
  context: ../..
  dockerfile: server/Dockerfile

x-nginx-build: &nginx-build
  context: ../..
  dockerfile: deployments/docker/nginx.Dockerfile
  args:
    VITE_NETSTAMP_REGISTRATION_ENABLED: ${VITE_NETSTAMP_REGISTRATION_ENABLED:-true}
    VITE_NETSTAMP_PROJECT_CREATION_ENABLED: ${VITE_NETSTAMP_PROJECT_CREATION_ENABLED:-true}
    VITE_NETSTAMP_USER_CREDENTIAL_CHANGES_ENABLED: ${VITE_NETSTAMP_USER_CREDENTIAL_CHANGES_ENABLED:-true}
    VITE_NETSTAMP_DEMO_MODE: ${VITE_NETSTAMP_DEMO_MODE:-false}
    VITE_NETSTAMP_DEMO_EMAIL: ${VITE_NETSTAMP_DEMO_EMAIL:-}
    VITE_NETSTAMP_DEMO_PASSWORD: ${VITE_NETSTAMP_DEMO_PASSWORD:-}

x-demo-build: &demo-build
  context: ../..
  dockerfile: deployments/docker/Dockerfile
  args:
    VITE_NETSTAMP_REGISTRATION_ENABLED: "false"
    VITE_NETSTAMP_PROJECT_CREATION_ENABLED: "false"
    VITE_NETSTAMP_USER_CREDENTIAL_CHANGES_ENABLED: "false"
    VITE_NETSTAMP_DEMO_MODE: "true"
    VITE_NETSTAMP_DEMO_EMAIL: ${VITE_NETSTAMP_DEMO_EMAIL:-demo@netstamp.local}
    VITE_NETSTAMP_DEMO_PASSWORD: ${VITE_NETSTAMP_DEMO_PASSWORD:-password}

x-backend-environment: &backend-environment
  APP_ENV: production
  SERVICE_NAME: controller
  APP_VERSION: ${APP_VERSION:-v1}
  API_VERSION: ${API_VERSION:-v1}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_PSEUDONYM_KEY: ${LOG_PSEUDONYM_KEY:?set LOG_PSEUDONYM_KEY}
  BACKEND_BASE_URL: ${BACKEND_BASE_URL:-}
  HTTP_ADDR: :8080
  HTTP_TRUSTED_PROXIES: ${HTTP_TRUSTED_PROXIES:-}
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_USER: netstamp
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
  DATABASE_NAME: netstamp
  DATABASE_SSLMODE: disable
  DB_MAX_CONNS: ${DB_MAX_CONNS:-10}
  DB_MIN_CONNS: ${DB_MIN_CONNS:-0}
  DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-1h}
  DB_MAX_CONN_IDLE_TIME: ${DB_MAX_CONN_IDLE_TIME:-30m}
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?set AUTH_JWT_SECRET}
  AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL:-12h}
  AUTH_REGISTRATION_ENABLED: ${AUTH_REGISTRATION_ENABLED:-true}
  AUTH_ARGON2ID_MEMORY_KIB: ${AUTH_ARGON2ID_MEMORY_KIB:-65536}
  AUTH_ARGON2ID_ITERATIONS: ${AUTH_ARGON2ID_ITERATIONS:-3}
  AUTH_ARGON2ID_PARALLELISM: ${AUTH_ARGON2ID_PARALLELISM:-4}
  PROJECT_CREATION_ENABLED: ${PROJECT_CREATION_ENABLED:-true}
  USER_CREDENTIAL_CHANGES_ENABLED: ${USER_CREDENTIAL_CHANGES_ENABLED:-true}

services:
  postgres:
    image: ${TIMESCALEDB_IMAGE:-timescale/timescaledb:latest-pg16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: netstamp
      POSTGRES_USER: netstamp
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
    volumes:
      - netstamp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netstamp -d netstamp"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DATABASE_PUBLISH_ADDR:-0.0.0.0}:${DATABASE_PUBLISH_PORT:-5432}:5432"
    labels:
      - netstamp.logs=enabled

  postgres-exporter-init:
    image: ${POSTGRES_CLIENT_IMAGE:-postgres:16-alpine}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
      POSTGRES_EXPORTER_PASSWORD: ${POSTGRES_EXPORTER_PASSWORD:?set POSTGRES_EXPORTER_PASSWORD}
    command:
      - sh
      - -ec
      - |
        psql -h postgres -U netstamp -d netstamp -v ON_ERROR_STOP=1 -v exporter_password="$${POSTGRES_EXPORTER_PASSWORD}" <<'SQL'
        SELECT format('CREATE ROLE postgres_exporter LOGIN PASSWORD %L', :'exporter_password')
        WHERE NOT EXISTS (
          SELECT 1
          FROM pg_roles
          WHERE rolname = 'postgres_exporter'
        );
        \gexec
        ALTER ROLE postgres_exporter WITH LOGIN PASSWORD :'exporter_password';
        GRANT pg_monitor TO postgres_exporter;
        GRANT CONNECT ON DATABASE netstamp TO postgres_exporter;
        SQL
    labels:
      - netstamp.logs=enabled

  postgres-exporter:
    image: ${POSTGRES_EXPORTER_IMAGE:-prometheuscommunity/postgres-exporter:v0.17.1}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-exporter-init:
        condition: service_completed_successfully
    environment:
      DATA_SOURCE_URI: postgres:5432/netstamp?sslmode=disable
      DATA_SOURCE_USER: postgres_exporter
      DATA_SOURCE_PASS: ${POSTGRES_EXPORTER_PASSWORD:?set POSTGRES_EXPORTER_PASSWORD}
    command:
      - --collector.postmaster
      - --extend.query-path=/etc/postgres-exporter/queries.yaml
    expose:
      - "9187"
    volumes:
      - ./postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    labels:
      - netstamp.logs=enabled

  migrate:
    image: netstamp-controller:${NETSTAMP_IMAGE_TAG:-local}
    build: *backend-build
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *backend-environment
    entrypoint: ["/app/migrate"]
    command: ["-command", "up", "-dir", "/app/db/migrations"]
    labels:
      - netstamp.logs=enabled

  controller:
    image: netstamp-controller:${NETSTAMP_IMAGE_TAG:-local}
    build: *backend-build
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      victoria-traces:
        condition: service_started
    environment:
      <<: *backend-environment
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://victoria-traces:10428/insert/opentelemetry/v1/traces
    expose:
      - "8080"
    labels:
      - netstamp.logs=enabled

  demo:
    profiles: ["demo"]
    image: netstamp-demo:${NETSTAMP_IMAGE_TAG:-local}
    build: *demo-build
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      victoria-traces:
        condition: service_started
    environment:
      <<: *backend-environment
      SERVICE_NAME: demo-controller
      BACKEND_BASE_URL: ${DEMO_BACKEND_BASE_URL:-}
      AUTH_REGISTRATION_ENABLED: "false"
      PROJECT_CREATION_ENABLED: "false"
      USER_CREDENTIAL_CHANGES_ENABLED: "false"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://victoria-traces:10428/insert/opentelemetry/v1/traces
    expose:
      - "8080"
    labels:
      - netstamp.logs=enabled
    networks:
      - dokploy-network
      - default

  nginx:
    image: netstamp-web:${NETSTAMP_IMAGE_TAG:-local}
    build: *nginx-build
    restart: unless-stopped
    depends_on:
      controller:
        condition: service_started
    expose:
      - "80"
    labels:
      - netstamp.logs=enabled
    networks:
      - dokploy-network
      - default

  victoria-traces:
    image: ${VICTORIA_TRACES_IMAGE:-victoriametrics/victoria-traces:v0.8.2}
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-traces-data
      - -retentionPeriod=${VICTORIA_TRACES_RETENTION_PERIOD:-7d}
    volumes:
      - netstamp-victoria-traces:/victoria-traces-data
    labels:
      - netstamp.logs=enabled

  victoria-metrics:
    image: ${VICTORIA_METRICS_IMAGE:-victoriametrics/victoria-metrics:v1.140.0}
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=${VICTORIA_METRICS_RETENTION_PERIOD:-14d}
      - -promscrape.config=/etc/victoria-metrics/promscrape.yaml
    expose:
      - "8428"
    volumes:
      - netstamp-victoria-metrics:/victoria-metrics-data
      - ./victoria-metrics/observability-promscrape.yaml:/etc/victoria-metrics/promscrape.yaml:ro
    labels:
      - netstamp.logs=enabled

  victoria-logs:
    image: ${VICTORIA_LOGS_IMAGE:-victoriametrics/victoria-logs:v1.50.0}
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=${VICTORIA_LOGS_RETENTION_PERIOD:-14d}
    volumes:
      - netstamp-victoria-logs:/victoria-logs-data
    labels:
      - netstamp.logs=enabled

  vector:
    image: ${VECTOR_IMAGE:-timberio/vector:0.55.0-alpine}
    restart: unless-stopped
    user: root
    depends_on:
      victoria-logs:
        condition: service_started
    command: ["--config", "/etc/vector/vector.yaml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0}
    restart: unless-stopped
    depends_on:
      victoria-traces:
        condition: service_started
      victoria-metrics:
        condition: service_started
      victoria-logs:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ${GF_INSTALL_PLUGINS:-victoriametrics-logs-datasource}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/netstamp-controller-status.json
    expose:
      - "3000"
    volumes:
      - netstamp-grafana:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning.production:/etc/grafana/provisioning:ro
    labels:
      - netstamp.logs=enabled
    networks:
      - dokploy-network
      - default

volumes:
  netstamp-postgres:
  netstamp-victoria-traces:
  netstamp-victoria-metrics:
  netstamp-victoria-logs:
  netstamp-grafana:

networks:
  dokploy-network:
    external: true
