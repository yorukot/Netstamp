global:
  scrape_interval: 2s

scrape_configs:
  - job_name: controller
    metrics_path: /metrics
    static_configs:
      - targets:
          - controller:8080

  - job_name: postgres
    metrics_path: /metrics
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: probe-agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - 23.146.248.161:9091
