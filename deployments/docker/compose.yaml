x-netstamp-environment: &netstamp-environment
  APP_ENV: ${APP_ENV:-local}
  DEMO_MODE: ${DEMO_MODE:-false}
  SERVICE_NAME: ${SERVICE_NAME:-controller}
  APP_VERSION: ${NETSTAMP_VERSION:-latest}
  API_VERSION: ${API_VERSION:-v1}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_PSEUDONYM_KEY: ${LOG_PSEUDONYM_KEY:?set LOG_PSEUDONYM_KEY}
  SYSTEM_SETTINGS_ENCRYPTION_KEY: ${SYSTEM_SETTINGS_ENCRYPTION_KEY:?set SYSTEM_SETTINGS_ENCRYPTION_KEY}
  SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
  BACKEND_BASE_URL: ${BACKEND_BASE_URL:-}
  PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-}
  HTTP_ADDR: ":8080"
  REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-10s}
  HTTP_READ_HEADER_TIMEOUT: ${HTTP_READ_HEADER_TIMEOUT:-5s}
  HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-15s}
  HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-15s}
  HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
  HTTP_TRUSTED_PROXIES: ${HTTP_TRUSTED_PROXIES:-}
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_USER: netstamp
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
  DATABASE_NAME: netstamp
  DATABASE_SSLMODE: disable
  DB_MAX_CONNS: ${DB_MAX_CONNS:-10}
  DB_MIN_CONNS: ${DB_MIN_CONNS:-0}
  DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-1h}
  DB_MAX_CONN_IDLE_TIME: ${DB_MAX_CONN_IDLE_TIME:-30m}
  AUTH_SESSION_HASH_KEY: ${AUTH_SESSION_HASH_KEY:?set AUTH_SESSION_HASH_KEY}
  AUTH_API_TOKEN_HASH_KEY: ${AUTH_API_TOKEN_HASH_KEY:?set AUTH_API_TOKEN_HASH_KEY}
  AUTH_SESSION_IDLE_TTL: ${AUTH_SESSION_IDLE_TTL:-24h}
  AUTH_SESSION_ABSOLUTE_TTL: ${AUTH_SESSION_ABSOLUTE_TTL:-168h}
  AUTH_SESSION_TOUCH_INTERVAL: ${AUTH_SESSION_TOUCH_INTERVAL:-5m}
  AUTH_SUDO_TTL: ${AUTH_SUDO_TTL:-5m}
  AUTH_REGISTRATION_ENABLED: ${AUTH_REGISTRATION_ENABLED:-true}
  AUTH_EXTERNAL_FLOW_TTL: ${AUTH_EXTERNAL_FLOW_TTL:-10m}
  AUTH_OIDC_ENABLED: ${AUTH_OIDC_ENABLED:-false}
  AUTH_OIDC_ISSUER_URL: ${AUTH_OIDC_ISSUER_URL:-}
  AUTH_OIDC_CLIENT_ID: ${AUTH_OIDC_CLIENT_ID:-}
  AUTH_OIDC_CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET:-}
  AUTH_OIDC_DISPLAY_NAME: ${AUTH_OIDC_DISPLAY_NAME:-Single sign-on}
  AUTH_OIDC_JIT_PROVISIONING_ENABLED: ${AUTH_OIDC_JIT_PROVISIONING_ENABLED:-false}
  AUTH_GOOGLE_ENABLED: ${AUTH_GOOGLE_ENABLED:-false}
  AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
  AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
  AUTH_GOOGLE_DISPLAY_NAME: ${AUTH_GOOGLE_DISPLAY_NAME:-Google}
  AUTH_GOOGLE_JIT_PROVISIONING_ENABLED: ${AUTH_GOOGLE_JIT_PROVISIONING_ENABLED:-false}
  AUTH_GOOGLE_ALLOWED_HOSTED_DOMAINS: ${AUTH_GOOGLE_ALLOWED_HOSTED_DOMAINS:-}
  AUTH_GITHUB_ENABLED: ${AUTH_GITHUB_ENABLED:-false}
  AUTH_GITHUB_CLIENT_ID: ${AUTH_GITHUB_CLIENT_ID:-}
  AUTH_GITHUB_CLIENT_SECRET: ${AUTH_GITHUB_CLIENT_SECRET:-}
  AUTH_GITHUB_DISPLAY_NAME: ${AUTH_GITHUB_DISPLAY_NAME:-GitHub}
  AUTH_GITHUB_JIT_PROVISIONING_ENABLED: ${AUTH_GITHUB_JIT_PROVISIONING_ENABLED:-false}
  AUTH_GITHUB_ALLOW_SIGNUP: ${AUTH_GITHUB_ALLOW_SIGNUP:-true}
  AUTH_PASSWORD_RESET_TOKEN_TTL: ${AUTH_PASSWORD_RESET_TOKEN_TTL:-30m}
  AUTH_PASSWORD_RESET_RATE_LIMIT_WINDOW: ${AUTH_PASSWORD_RESET_RATE_LIMIT_WINDOW:-1h}
  AUTH_PASSWORD_RESET_IP_LIMIT: ${AUTH_PASSWORD_RESET_IP_LIMIT:-10}
  AUTH_PASSWORD_RESET_EMAIL_LIMIT: ${AUTH_PASSWORD_RESET_EMAIL_LIMIT:-3}
  AUTH_ARGON2ID_MEMORY_KIB: ${AUTH_ARGON2ID_MEMORY_KIB:-65536}
  AUTH_ARGON2ID_ITERATIONS: ${AUTH_ARGON2ID_ITERATIONS:-3}
  AUTH_ARGON2ID_PARALLELISM: ${AUTH_ARGON2ID_PARALLELISM:-4}
  ALERT_EVALUATION_ENABLED: ${ALERT_EVALUATION_ENABLED:-true}
  ASSIGNMENT_REFRESH_WORKER_ENABLED: ${ASSIGNMENT_REFRESH_WORKER_ENABLED:-true}
  ASSIGNMENT_REFRESH_WORKER_INTERVAL: ${ASSIGNMENT_REFRESH_WORKER_INTERVAL:-5s}
  ASSIGNMENT_REFRESH_WORKER_BATCH_SIZE: ${ASSIGNMENT_REFRESH_WORKER_BATCH_SIZE:-25}
  ASSIGNMENT_REFRESH_WORKER_STALE_TIMEOUT: ${ASSIGNMENT_REFRESH_WORKER_STALE_TIMEOUT:-1m}
  NOTIFICATION_WORKER_ENABLED: ${NOTIFICATION_WORKER_ENABLED:-true}
  NOTIFICATION_WORKER_INTERVAL: ${NOTIFICATION_WORKER_INTERVAL:-5s}
  NOTIFICATION_WORKER_BATCH_SIZE: ${NOTIFICATION_WORKER_BATCH_SIZE:-25}
  NOTIFICATION_WORKER_STALE_TIMEOUT: ${NOTIFICATION_WORKER_STALE_TIMEOUT:-1m}
  NOTIFICATION_HTTP_TIMEOUT: ${NOTIFICATION_HTTP_TIMEOUT:-10s}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SMTP_TLS_MODE: ${SMTP_TLS_MODE:-starttls}
  SMTP_TIMEOUT: ${SMTP_TIMEOUT:-10s}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}

services:
  postgres:
    image: ${TIMESCALEDB_IMAGE:-timescale/timescaledb:latest-pg16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: netstamp
      POSTGRES_USER: netstamp
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
    volumes:
      - netstamp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netstamp -d netstamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ${NETSTAMP_IMAGE:-yorukot/netstamp}:${NETSTAMP_VERSION:-latest}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *netstamp-environment
    entrypoint: ["/app/migrate"]
    command: ["-command", "up", "-dir", "/app/db/migrations"]

  netstamp:
    image: ${NETSTAMP_IMAGE:-yorukot/netstamp}:${NETSTAMP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: *netstamp-environment
    ports:
      - "${NETSTAMP_PORT:-3000}:8080"

volumes:
  netstamp-postgres:
