x-netstamp-environment: &netstamp-environment
  APP_ENV: ${APP_ENV:-local}
  SERVICE_NAME: controller
  APP_VERSION: ${NETSTAMP_VERSION:-latest}
  API_VERSION: ${API_VERSION:-v1}
  DEMO_MODE: ${DEMO_MODE:-false}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_PSEUDONYM_KEY: ${LOG_PSEUDONYM_KEY:-change-me}
  BACKEND_BASE_URL: ${BACKEND_BASE_URL:-}
  HTTP_ADDR: :8080
  HTTP_TRUSTED_PROXIES: ${HTTP_TRUSTED_PROXIES:-}
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_USER: netstamp
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-netstamp}
  DATABASE_NAME: netstamp
  DATABASE_SSLMODE: disable
  DB_MAX_CONNS: ${DB_MAX_CONNS:-10}
  DB_MIN_CONNS: ${DB_MIN_CONNS:-0}
  DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-1h}
  DB_MAX_CONN_IDLE_TIME: ${DB_MAX_CONN_IDLE_TIME:-30m}
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-me}
  AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL:-12h}
  AUTH_REGISTRATION_ENABLED: ${AUTH_REGISTRATION_ENABLED:-true}
  AUTH_ARGON2ID_MEMORY_KIB: ${AUTH_ARGON2ID_MEMORY_KIB:-65536}
  AUTH_ARGON2ID_ITERATIONS: ${AUTH_ARGON2ID_ITERATIONS:-3}
  AUTH_ARGON2ID_PARALLELISM: ${AUTH_ARGON2ID_PARALLELISM:-4}
  ALERT_EVALUATION_ENABLED: ${ALERT_EVALUATION_ENABLED:-true}
  NOTIFICATION_WORKER_ENABLED: ${NOTIFICATION_WORKER_ENABLED:-true}
  NOTIFICATION_WORKER_INTERVAL: ${NOTIFICATION_WORKER_INTERVAL:-5s}
  NOTIFICATION_WORKER_BATCH_SIZE: ${NOTIFICATION_WORKER_BATCH_SIZE:-25}
  NOTIFICATION_WORKER_STALE_TIMEOUT: ${NOTIFICATION_WORKER_STALE_TIMEOUT:-1m}
  NOTIFICATION_HTTP_TIMEOUT: ${NOTIFICATION_HTTP_TIMEOUT:-10s}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}

services:
  postgres:
    image: ${TIMESCALEDB_IMAGE:-timescale/timescaledb:latest-pg16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: netstamp
      POSTGRES_USER: netstamp
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-netstamp}
    volumes:
      - netstamp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netstamp -d netstamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ${NETSTAMP_IMAGE:-yorukot/netstamp}:${NETSTAMP_VERSION:-latest}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *netstamp-environment
    entrypoint: ["/app/migrate"]
    command: ["-command", "up", "-dir", "/app/db/migrations"]

  netstamp:
    image: ${NETSTAMP_IMAGE:-yorukot/netstamp}:${NETSTAMP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: *netstamp-environment
    ports:
      - "${NETSTAMP_PORT:-3000}:8080"

volumes:
  netstamp-postgres:
