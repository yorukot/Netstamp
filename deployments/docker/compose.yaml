x-netstamp-environment: &netstamp-environment
  APP_ENV: ${APP_ENV:-local}
  APP_VERSION: ${NETSTAMP_VERSION:-latest}
  BACKEND_BASE_URL: ${BACKEND_BASE_URL:-}
  HTTP_TRUSTED_PROXIES: ${HTTP_TRUSTED_PROXIES:-}
  DATABASE_HOST: postgres
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
  AUTH_SESSION_HASH_KEY: ${AUTH_SESSION_HASH_KEY:?set AUTH_SESSION_HASH_KEY}
  AUTH_API_TOKEN_HASH_KEY: ${AUTH_API_TOKEN_HASH_KEY:?set AUTH_API_TOKEN_HASH_KEY}
  AUTH_SUDO_TTL: ${AUTH_SUDO_TTL:-5m}
  AUTH_EXTERNAL_FLOW_TTL: ${AUTH_EXTERNAL_FLOW_TTL:-10m}
  AUTH_OIDC_ENABLED: ${AUTH_OIDC_ENABLED:-false}
  AUTH_OIDC_ISSUER_URL: ${AUTH_OIDC_ISSUER_URL:-}
  AUTH_OIDC_CLIENT_ID: ${AUTH_OIDC_CLIENT_ID:-}
  AUTH_OIDC_CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET:-}
  AUTH_OIDC_DISPLAY_NAME: ${AUTH_OIDC_DISPLAY_NAME:-Single sign-on}
  AUTH_OIDC_JIT_PROVISIONING_ENABLED: ${AUTH_OIDC_JIT_PROVISIONING_ENABLED:-false}
  AUTH_GOOGLE_ENABLED: ${AUTH_GOOGLE_ENABLED:-false}
  AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
  AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
  AUTH_GOOGLE_DISPLAY_NAME: ${AUTH_GOOGLE_DISPLAY_NAME:-Google}
  AUTH_GOOGLE_JIT_PROVISIONING_ENABLED: ${AUTH_GOOGLE_JIT_PROVISIONING_ENABLED:-false}
  AUTH_GOOGLE_ALLOWED_HOSTED_DOMAINS: ${AUTH_GOOGLE_ALLOWED_HOSTED_DOMAINS:-}
  AUTH_GITHUB_ENABLED: ${AUTH_GITHUB_ENABLED:-false}
  AUTH_GITHUB_CLIENT_ID: ${AUTH_GITHUB_CLIENT_ID:-}
  AUTH_GITHUB_CLIENT_SECRET: ${AUTH_GITHUB_CLIENT_SECRET:-}
  AUTH_GITHUB_DISPLAY_NAME: ${AUTH_GITHUB_DISPLAY_NAME:-GitHub}
  AUTH_GITHUB_JIT_PROVISIONING_ENABLED: ${AUTH_GITHUB_JIT_PROVISIONING_ENABLED:-false}
  AUTH_GITHUB_ALLOW_SIGNUP: ${AUTH_GITHUB_ALLOW_SIGNUP:-true}

services:
  postgres:
    image: ${TIMESCALEDB_IMAGE:-timescale/timescaledb:latest-pg16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: netstamp
      POSTGRES_USER: netstamp
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
    volumes:
      - netstamp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netstamp -d netstamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ${NETSTAMP_IMAGE:-yorukot/netstamp}:${NETSTAMP_VERSION:-latest}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *netstamp-environment
    entrypoint: ["/app/migrate"]
    command: ["-command", "up", "-dir", "/app/db/migrations"]

  netstamp:
    image: ${NETSTAMP_IMAGE:-yorukot/netstamp}:${NETSTAMP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: *netstamp-environment
    ports:
      - "${NETSTAMP_PORT:-3000}:8080"

volumes:
  netstamp-postgres:
