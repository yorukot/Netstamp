sources:
  docker:
    type: docker_logs
    include_labels:
      - netstamp.logs=enabled

transforms:
  parse_json_logs:
    type: remap
    inputs:
      - docker
    source: |
      if !exists(.service) && exists(."label.com.docker.compose.service") {
        .service = ."label.com.docker.compose.service"
      }

      parsed, err = parse_json(.message)
      if err == null && is_object(parsed) {
        . = merge!(parsed, .)
      }

sinks:
  victoria_logs:
    type: elasticsearch
    inputs:
      - parse_json_logs
    endpoints:
      - http://victoria-logs:9428/insert/elasticsearch/
    mode: bulk
    api_version: v8
    compression: gzip
    healthcheck:
      enabled: false
    query:
      _msg_field: message
      _time_field: timestamp
      _stream_fields: host,container_name,stream
      ignore_fields: label
