project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
preserve_hierarchy: true

files:
  - source: /web/src/i18n/locales/en/*.json
    translation: /web/src/i18n/locales/%locale%/%original_file_name%
    languages_mapping:
      locale:
        zh-TW: zh-TW

  - source: /docs/src/i18n/locales/en/*.json
    translation: /docs/src/i18n/locales/%locale%/%original_file_name%
    languages_mapping:
      locale:
        zh-TW: zh-TW

  - source: /docs/src/content/docs/en/**/*.mdx
    translation: /docs/src/content/docs/%locale%/**/%original_file_name%
    languages_mapping:
      locale:
        zh-TW: zh-TW
