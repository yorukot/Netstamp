name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - ".github/workflows/backend.yaml"
      - ".prettierrc"
      - "api/**"
      - "docs/public/openapi.json"
      - "golangci.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "server/**"
      - "web/src/shared/api/openapi.d.ts"
  workflow_dispatch:

env:
  GOLANGCI_LINT_VERSION: v2.12.2

permissions:
  contents: read
  pull-requests: read

jobs:
  Changes:
    name: Detect backend changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.relevant == 'true' }}
    steps:
      - name: Checkout repo
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Detect relevant changes
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - ".github/workflows/backend.yaml"
              - ".prettierrc"
              - "api/**"
              - "docs/public/openapi.json"
              - "golangci.yaml"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "server/**"
              - "web/src/shared/api/openapi.d.ts"

  Format:
    name: Check formatting
    needs: Changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip backend formatting
        if: needs.Changes.outputs.relevant != 'true'
        run: echo "No backend-related changes; skipping backend formatting."

      - name: Checkout repo
        if: needs.Changes.outputs.relevant == 'true'
        uses: actions/checkout@v6

      - name: Setup Go
        if: needs.Changes.outputs.relevant == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install golangci-lint
        if: needs.Changes.outputs.relevant == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true
          working-directory: server

      - name: Run backend formatters
        if: needs.Changes.outputs.relevant == 'true'
        run: cd server && golangci-lint fmt --config ../golangci.yaml

      - name: Check backend formatting diff
        if: needs.Changes.outputs.relevant == 'true'
        run: git diff --exit-code -- server

  Lint:
    name: Run lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true
          working-directory: server

      - name: Run backend lint
        working-directory: server
        run: golangci-lint run --config ../golangci.yaml ./...

  Test:
    name: Run tests
    needs: Changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip backend tests
        if: needs.Changes.outputs.relevant != 'true'
        run: echo "No backend-related changes; skipping backend tests."

      - name: Checkout repo
        if: needs.Changes.outputs.relevant == 'true'
        uses: actions/checkout@v6

      - name: Setup Go
        if: needs.Changes.outputs.relevant == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run backend tests
        if: needs.Changes.outputs.relevant == 'true'
        run: cd server && go test ./...

  OpenAPI:
    name: Check generated OpenAPI artifacts
    needs: Changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip generated OpenAPI check
        if: needs.Changes.outputs.relevant != 'true'
        run: echo "No backend-related changes; skipping generated OpenAPI checks."

      - name: Checkout repo
        if: needs.Changes.outputs.relevant == 'true'
        uses: actions/checkout@v6

      - name: Setup pnpm
        if: needs.Changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        if: needs.Changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        if: needs.Changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Prepare OpenAPI check outputs
        if: needs.Changes.outputs.relevant == 'true'
        run: |
          openapi_check_dir="$(mktemp -d)"
          api_types_check_dir="$(mktemp -d)"
          echo "OPENAPI_CHECK_DIR=$openapi_check_dir" >> "$GITHUB_ENV"
          echo "OPENAPI_CHECK_FILE=$openapi_check_dir/openapi.json" >> "$GITHUB_ENV"
          echo "API_TYPES_CHECK_FILE=$api_types_check_dir/openapi.d.ts" >> "$GITHUB_ENV"

      - name: Generate OpenAPI from TypeSpec
        if: needs.Changes.outputs.relevant == 'true'
        run: |
          pnpm --filter @netstamp/api exec tsp compile . --warn-as-error --option @typespec/openapi3.emitter-output-dir="$OPENAPI_CHECK_DIR"

      - name: Generate web API types
        if: needs.Changes.outputs.relevant == 'true'
        run: pnpm --filter @netstamp/web exec openapi-typescript "$OPENAPI_CHECK_FILE" -o "$API_TYPES_CHECK_FILE"

      - name: Format generated OpenAPI artifacts
        if: needs.Changes.outputs.relevant == 'true'
        run: pnpm exec prettier --config .prettierrc --write "$OPENAPI_CHECK_FILE" "$API_TYPES_CHECK_FILE"

      - name: Compare generated OpenAPI
        if: needs.Changes.outputs.relevant == 'true'
        run: |
          diff -u docs/public/openapi.json "$OPENAPI_CHECK_FILE" || {
            echo "Generated OpenAPI is out of date. Run 'pnpm generate:openapi' and commit docs/public/openapi.json."
            exit 1
          }

      - name: Compare embedded backend OpenAPI
        if: needs.Changes.outputs.relevant == 'true'
        run: |
          diff -u server/internal/controller/transport/http/openapi/openapi.json "$OPENAPI_CHECK_FILE" || {
            echo "Embedded backend OpenAPI is out of date. Run 'pnpm generate:openapi' and commit server/internal/controller/transport/http/openapi/openapi.json."
            exit 1
          }

      - name: Compare generated web API types
        if: needs.Changes.outputs.relevant == 'true'
        run: |
          diff -u web/src/shared/api/openapi.d.ts "$API_TYPES_CHECK_FILE" || {
            echo "Generated web API types are out of date. Run 'pnpm generate:openapi' and commit web/src/shared/api/openapi.d.ts."
            exit 1
          }
