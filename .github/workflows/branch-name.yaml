name: Branch Name

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  Validate:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Check branch name
        run: sh scripts/check-branch-name.sh "$GITHUB_HEAD_REF"
