name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  Format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier
        run: pnpm prettier --check .

  Frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @netstamp/web lint

      - name: Typecheck
        run: pnpm --filter @netstamp/web typecheck

  Components:
    name: Test components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @netstamp/ui typecheck

  Docs:
    name: Test docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @netstamp/docs build

  OpenAPI:
    name: Check generated OpenAPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI from backend
        run: |
          openapi_check_dir="$(mktemp -d docs/public/openapi-check.XXXXXX)"
          echo "OPENAPI_CHECK_FILE=$openapi_check_dir/openapi.json" >> "$GITHUB_ENV"
          cd server
          go run ./cmd/openapi -output "../$openapi_check_dir/openapi.json"

      - name: Format generated OpenAPI
        run: pnpm exec prettier --write "$OPENAPI_CHECK_FILE"

      - name: Compare generated OpenAPI
        run: |
          diff -u docs/public/openapi.json "$OPENAPI_CHECK_FILE" || {
            echo "Generated OpenAPI is out of date. Run 'pnpm generate:openapi' and commit docs/public/openapi.json."
            exit 1
          }
